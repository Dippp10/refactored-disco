name: Repo PR Automation

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install jq -y

      - name: Automation script
        env:
          TOKEN: ${{ secrets.GH_TOKEN2 }}
          USERNAME: ${{ github.repository_owner }}
        run: |

          TARGET_OWNER="vamansworld786-arch"
          TARGET_REPO="blahblahblah"

          for i in {1..30}
          do

          NEW_REPO="auto-repo-$(date +%s)-$i"

          echo "Creating repository"

          curl -X POST https://api.github.com/user/repos \
          -H "Authorization: token $TOKEN" \
          -d "{\"name\":\"$NEW_REPO\",\"private\":false}"

          sleep 5

          echo "Starring external repository"

          curl -X PUT https://api.github.com/user/starred/$TARGET_OWNER/$TARGET_REPO \
          -H "Authorization: token $TOKEN"

          echo "Forking repository"

          curl -X POST https://api.github.com/repos/$TARGET_OWNER/$TARGET_REPO/forks \
          -H "Authorization: token $TOKEN"

          sleep 20

          echo "Adding change to fork"

          CONTENT=$(echo "Automated update $(date)" | base64)

          curl -X PUT https://api.github.com/repos/$USERNAME/$TARGET_REPO/contents/update.txt \
          -H "Authorization: token $TOKEN" \
          -d "{\"message\":\"automation commit\",\"content\":\"$CONTENT\"}"

          echo "Creating pull request"

          PR=$(curl -s -X POST https://api.github.com/repos/$TARGET_OWNER/$TARGET_REPO/pulls \
          -H "Authorization: token $TOKEN" \
          -d "{\"title\":\"Automated PR\",\"head\":\"$USERNAME:main\",\"base\":\"main\"}")

          PR_NUMBER=$(echo $PR | jq -r .number)

          echo "Pull request number: $PR_NUMBER"

          echo "Auto merging PR"

          curl -X PUT https://api.github.com/repos/$TARGET_OWNER/$TARGET_REPO/pulls/$PR_NUMBER/merge \
          -H "Authorization: token $TOKEN" \
          -d '{"merge_method":"merge"}'

          sleep 10

          done
