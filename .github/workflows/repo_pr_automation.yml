name: Repo PR Automation

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install jq -y

      - name: Automation script
        env:
          TOKEN: ${{ secrets.GH_TOKEN2 }}
          USERNAME: ${{ github.repository_owner }}
        run: |

          TARGET_OWNER="Dippp10"
          TARGET_REPO="refactored-disco"

          echo "Forking repository"
          curl -L -X POST https://api.github.com/repos/$TARGET_OWNER/$TARGET_REPO/forks \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json"

          echo "Waiting for fork to be ready"
          sleep 40

          for i in {1..30}
          do

          NEW_REPO="auto-repo-$(date +%s)-$i"

          echo "Creating repository $NEW_REPO"

          curl -L -X POST https://api.github.com/user/repos \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"name\":\"$NEW_REPO\",\"private\":false}"

          echo "Starring target repository"

          curl -L -X PUT \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/user/starred/$TARGET_OWNER/$TARGET_REPO

          CONTENT=$(echo "Automated update $(date)" | base64 -w 0)

          curl -L -X PUT https://api.github.com/repos/$USERNAME/$TARGET_REPO/contents/update-$i.txt \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"message\":\"automation commit\",\"content\":\"$CONTENT\",\"branch\":\"main\"}"

          PR=$(curl -s -L -X POST https://api.github.com/repos/$TARGET_OWNER/$TARGET_REPO/pulls \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"title\":\"Automated PR $i\",\"head\":\"$USERNAME:main\",\"base\":\"main\"}")

          PR_NUMBER=$(echo $PR | jq -r .number)

          echo "PR number: $PR_NUMBER"

          curl -L -X PUT https://api.github.com/repos/$TARGET_OWNER/$TARGET_REPO/pulls/$PR_NUMBER/merge \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -d '{"merge_method":"merge"}'

          sleep 3

          done
